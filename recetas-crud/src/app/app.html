    </div>
  </div>
</header>

<nav class="barra-navegacion">
  <div class="contenedor menu-principal">
    <a routerLink="/" routerLinkActive="activo" [routerLinkActiveOptions]="{ exact: true }">

    <a routerLink="/crear" routerLinkActive="activo">

<footer class="pie-app">
