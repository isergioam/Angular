<section class="contenedor">
    <h1>Crear reserva</h1>

    <form (ngSubmit)="guardarReserva()" #formulario="ngForm">
        <div class="campo">
            <label for="nombreCliente">Nombre del cliente</label>
            <input type="text" id="nombreCliente" name="nombreCliente" [(ngModel)]="nuevaReserva.nombreCliente"
                required />
        </div>

        <div class="campo">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" [(ngModel)]="nuevaReserva.telefono" required />
        </div>

        <div class="campo">
            <label for="fechaReserva">Fecha de la reserva</label>
            <input type="date" id="fechaReserva" name="fechaReserva" [(ngModel)]="nuevaReserva.fechaReserva" required />
        </div>

        <div class="campo">
            <label for="horaReserva">Hora de la reserva</label>
            <input type="time" id="horaReserva" name="horaReserva" [(ngModel)]="nuevaReserva.horaReserva" required />
        </div>

        <div class="campo">
            <label for="numeroPersonas">Número de personas</label>
            <input type="number" id="numeroPersonas" name="numeroPersonas" [(ngModel)]="nuevaReserva.numeroPersonas"
                required min="2" />
        </div>

        <div class="campo">
            <label for="numeroMesa">Número de mesa</label>
            <input type="number" id="numeroMesa" name="numeroMesa" [(ngModel)]="nuevaReserva.numeroMesa" required
                min="1" />
        </div>

        <div class="campo">
            <label for="observaciones">Observaciones</label>
            <textarea id="observaciones" name="observaciones" [(ngModel)]="nuevaReserva.observaciones"
                rows="4" placeholder="Ejemplo: cumpleaños, alergias, mesa interior..."></textarea>
        </div>

        <div class="acciones">
            <button type="submit">Guardar reserva</button>
            <a routerLink="/reservas">Cancelar</a>
        </div>
    </form>
</section>
