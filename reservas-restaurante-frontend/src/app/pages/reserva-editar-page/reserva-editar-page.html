<section class="contenedor">
  <h1>Editando la reserva número {{ idReserva }}</h1>

  @if (reserva === null) {
  <p class="mensaje-error">No se ha encontrado la reserva.</p>

  } @else if (reserva) {
  <form (ngSubmit)="guardarCambios()">
    <div class="campo">
      <label for="nombreCliente">Nombre del cliente</label>
      <input type="text" id="nombreCliente" name="nombreCliente" [(ngModel)]="reserva.nombreCliente" required />
    </div>

    <div class="campo">
      <label for="telefono">Teléfono</label>
      <input type="text" id="telefono" name="telefono" [(ngModel)]="reserva.telefono" required />
    </div>

    <div class="campo">
      <label for="fechaReserva">Fecha de la reserva</label>
      <input type="date" id="fechaReserva" name="fechaReserva" [(ngModel)]="reserva.fechaReserva" required />
    </div>

    <div class="campo">
      <label for="horaReserva">Hora de la reserva</label>
      <input type="time" id="horaReserva" name="horaReserva" [(ngModel)]="reserva.horaReserva" required />
    </div>

    <div class="campo">
      <label for="numeroPersonas">Número de personas</label>
      <input type="number" id="numeroPersonas" name="numeroPersonas" [(ngModel)]="reserva.numeroPersonas" required
        min="1" />
    </div>

    <div class="campo">
      <label for="numeroMesa">Número de mesa</label>
      <input type="number" id="numeroMesa" name="numeroMesa" [(ngModel)]="reserva.numeroMesa" required min="1" />
    </div>

    <div class="campo">
      <label for="observaciones">Observaciones</label>
      <textarea id="observaciones" name="observaciones" [(ngModel)]="reserva.observaciones" rows="4"></textarea>
    </div>

    <div class="acciones">
      <button type="submit">Guardar cambios</button>
      <a routerLink="/reservas">Cancelar</a>
    </div>
  </form>

  } @else {
  <p>Cargando reserva...</p>
  }


</section>
