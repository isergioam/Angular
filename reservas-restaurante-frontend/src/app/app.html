<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Restaurante</h1>
      <p>Gestión de reservas</p>
    </div>

    <nav class="menu">
      <a routerLink="/" routerLinkActive="activo" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/reservas" routerLinkActive="activo">Reservas</a>
      <a routerLink="/reservas/nueva" routerLinkActive="activo">Nueva reserva</a>
      <a routerLink="/reservas/calendario" routerLinkActive="activo">Calendario</a>
      <a routerLink="/mesas/panel" routerLinkActive="activo">Panel de mesas</a>
    </nav>
  </aside>

  <div class="contenido">
    <header class="topbar">
      <h2>Panel de gestión</h2>
      <span class="badge">Angular + Java</span>
    </header>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
