<h2>Contactos</h2>

@if (cargando) {
  <p>Cargando contactos...</p>
}

@if (error) {
  <p>{{ error }}</p>
}

@if (!cargando && contactos.length > 0) {
  <ul>
    @for (contacto of contactos; track contacto.id) {
      <li>
        {{ contacto.nombre }} {{ contacto.apellidos }} - {{ contacto.categoriaNombre }}
      </li>
    }
  </ul>
}
